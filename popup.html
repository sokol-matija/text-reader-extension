<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🔊 Text Reader</h1>
      <div id="status-badge" class="status-badge ready">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Voice Selection -->
      <div class="section">
        <label for="voiceSelect" class="label">Voice</label>
        <select id="voiceSelect" class="voice-select">
          <option value="default">af_sky (Default)</option>
          <option value="af">af</option>
          <option value="am">am</option>
          <option value="as">as</option>
          <option value="ba">ba</option>
          <option value="be">be</option>
          <option value="bg">bg</option>
          <option value="bn">bn</option>
          <option value="ca">ca</option>
          <option value="cs">cs</option>
          <option value="cy">cy</option>
          <option value="da">da</option>
          <option value="de">de</option>
          <option value="el">el</option>
          <option value="en">en</option>
          <option value="es">es</option>
          <option value="et">et</option>
          <option value="fa">fa</option>
          <option value="fi">fi</option>
          <option value="fr">fr</option>
          <option value="ga">ga</option>
          <option value="gl">gl</option>
          <option value="gu">gu</option>
          <option value="he">he</option>
          <option value="hi">hi</option>
          <option value="hr">hr</option>
          <option value="hu">hu</option>
          <option value="id">id</option>
          <option value="is">is</option>
          <option value="it">it</option>
          <option value="ja">ja</option>
          <option value="jv">jv</option>
          <option value="ka">ka</option>
          <option value="kn">kn</option>
          <option value="ko">ko</option>
          <option value="ky">ky</option>
          <option value="lt">lt</option>
          <option value="lv">lv</option>
          <option value="mk">mk</option>
          <option value="ml">ml</option>
          <option value="mn">mn</option>
          <option value="mr">mr</option>
          <option value="ms">ms</option>
          <option value="mt">mt</option>
          <option value="my">my</option>
          <option value="ne">ne</option>
          <option value="nl">nl</option>
          <option value="or">or</option>
          <option value="pa">pa</option>
          <option value="pl">pl</option>
          <option value="pt">pt</option>
          <option value="ro">ro</option>
          <option value="ru">ru</option>
          <option value="sk">sk</option>
          <option value="sl">sl</option>
          <option value="so">so</option>
          <option value="sq">sq</option>
          <option value="sr">sr</option>
          <option value="su">su</option>
          <option value="sv">sv</option>
          <option value="sw">sw</option>
          <option value="ta">ta</option>
          <option value="te">te</option>
          <option value="tg">tg</option>
          <option value="th">th</option>
          <option value="tr">tr</option>
          <option value="uk">uk</option>
          <option value="ur">ur</option>
          <option value="uz">uz</option>
          <option value="vi">vi</option>
          <option value="zh">zh</option>
          <option value="zu">zu</option>
        </select>
      </div>

      <!-- Text Input -->
      <div class="section">
        <label for="textInput" class="label">Text to Read</label>
        <textarea id="textInput" placeholder="Paste or type text here..."></textarea>
      </div>

      <!-- Status Message -->
      <div id="status" class="status hidden"></div>

      <!-- Controls -->
      <div class="controls">
        <button id="readBtn" class="btn btn-primary">
          <span class="btn-icon">🔊</span>
          <span class="btn-text">Read Aloud</span>
        </button>
        <button id="stopBtn" class="btn btn-secondary" disabled>
          <span class="btn-icon">⏹</span>
          <span class="btn-text">Stop</span>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">Powered by Kokoro TTS</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
